<!DOCTYPE html>
<html lang="en">
<head>
{% include "_head.html" %}
</head>
<body>
<div class="blobs"><div class="blob a"></div><div class="blob b"></div></div>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
  <div class="card" style="width:100%; max-width:380px;">
    <div class="logo" style="justify-content:center; margin-bottom:18px;">
      <div class="logo-icon">GC</div>
    </div>
    <h1 style="text-align:center; font-size:1.4rem;">Dev Console</h1>
    <p class="page-sub" style="text-align:center;">GymCoach Studio — internal access only</p>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" required autocomplete="username" />
      <label>Password</label>
      <input type="password" id="password" required autocomplete="current-password" />
      <button class="btn" type="submit" style="width:100%; justify-content:center; margin-top:20px;">Log in</button>
    </form>
    <p id="err" style="color:var(--danger); font-size:13px; margin-top:12px; display:none;"></p>
  </div>
</div>

<script src="/static/js/nav.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = document.getElementById("err");
  errEl.style.display = "none";
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Login failed");
    localStorage.setItem("dev_token", data.access_token);
    window.location.href = "/dashboard";
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
  }
});
</script>
</body>
</html>
