services:
  - type: web
    name: gymcoach-dev-console
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MEMBER_APP_BASE_URL
        sync: false
      - key: DEV_TEST_KEY
        sync: false
      - key: DEV_SIGNUP_SECRET
        sync: false
